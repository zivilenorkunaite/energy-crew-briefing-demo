bundle:
  name: ee-crew-briefing

workspace:
  host: https://fe-vm-vdm-classic-dz1ef4.cloud.databricks.com

sync:
  exclude:
    - .git/
    - .databricks/
    - .env
    - __pycache__/
    - "*.pyc"
    - swms_pdfs/
    - mlflow.db
    - mlruns/
    - generate_swms_pdfs.py
    - architecture.*
    - mermaid-config.json

resources:
  apps:
    ee-crew-briefing:
      name: ee-crew-briefing
      description: "Field Operations Briefing Assistant — Genie + SWMS + Weather + Web Search"
      source_code_path: ../ee-crew-briefing

      config:
        command:
          - python
          - -m
          - uvicorn
          - "app:app"
          - --host
          - "0.0.0.0"
          - --port
          - "8000"
        env:
          - name: AI_GATEWAY_URL
            value: "https://1313663707993479.ai-gateway.cloud.databricks.com/mlflow/v1/chat/completions"
          - name: LLM_MODEL
            value: databricks-claude-sonnet-4-6
          - name: SUPERVISOR_MODEL
            value: databricks-gemini-2-5-flash
          - name: SWMS_ENDPOINT
            value: swms-knowledge-assistant-v2
          - name: TAVILY_API_KEY
            value_from: tavily-api-key
          - name: PGHOST
            value: ep-jolly-leaf-d20ipqcy.database.us-east-1.cloud.databricks.com
          - name: PGDATABASE
            value: databricks_postgres
          - name: PGPORT
            value: "5432"
          - name: PGSSLMODE
            value: require
          - name: ENDPOINT_NAME
            value: projects/ee-crew-briefing-as/branches/production/endpoints/primary

      resources:
        - name: swms-v2
          description: "SWMS Knowledge Assistant v2 — lightweight RAG"
          serving_endpoint:
            name: swms-knowledge-assistant-v2
            permission: CAN_QUERY

        - name: tavily-api-key
          description: "Tavily API key for web search"
          secret:
            scope: ee-crew-briefing
            key: tavily-api-key
            permission: READ

        - name: sql-warehouse
          description: "SQL Warehouse for weather + data queries"
          sql_warehouse:
            id: c2abb17a6c9e6bc0
            permission: CAN_USE

        # NOTE: UC function zivile.essential_energy_wacs.get_weather — EXECUTE granted to SP directly
        # (function resources not supported in bundle format)

        # NOTE: postgres and genie resources are not supported in bundle format.
        # They are managed via REST API in deploy.sh:
        #   - Lakebase Autoscaling (ee-crew-briefing-as) — CAN_CONNECT_AND_CREATE
        #   - Genie Room (01f111b05416164989106b097e2f7d21) — CAN_RUN

  jobs:
    bom-weather-refresh:
      name: ee-crew-briefing-bom-refresh
      tags:
        demo: crew_briefing
      environments:
        - environment_key: Default
          spec:
            client: "1"
      tasks:
        - task_key: refresh_bom
          notebook_task:
            notebook_path: setup/03_bom_refresh.py
          environment_key: Default
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "Australia/Sydney"
