bundle:
  name: energy-crew-briefing

sync:
  exclude:
    - .git/
    - .databricks/
    - .env
    - __pycache__/
    - "*.pyc"
    - swms_pdfs/
    - asset_images/
    - mlflow.db
    - mlruns/
    - generate_swms_pdfs.py
    - architecture.*
    - mermaid-config.json

resources:
  database_instances:
    crew-briefing-db:
      name: energy-crew-briefing
      capacity: CU_1

  database_catalogs:
    crew-briefing-catalog:
      database_instance_name: ${resources.database_instances.crew-briefing-db.name}
      database_name: crew_briefing
      name: crew_briefing_catalog
      create_database_if_not_exists: true

  apps:
    energy-crew-briefing:
      name: energy-crew-briefing
      description: "Field Operations Briefing Assistant — Genie + SWMS + Weather + Web Search"
      source_code_path: ../energy-crew-briefing

      config:
        command:
          - python
          - -m
          - uvicorn
          - "app:app"
          - --host
          - "0.0.0.0"
          - --port
          - "8000"
        env:
          - name: LLM_MODEL
            value: databricks-claude-sonnet-4-6
          - name: SUPERVISOR_MODEL
            value: databricks-claude-sonnet-4-6
          - name: SWMS_ENDPOINT
            value: swms-knowledge-assistant-v2
          - name: TAVILY_API_KEY
            value_from: tavily-api-key
          - name: GENIE_SPACE_ID
            value_from: genie-field-ops
          - name: MLFLOW_TRACING_DESTINATION
            value: main.energy_crew_briefing
          - name: MLFLOW_TRACING_SQL_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: MLFLOW_EXPERIMENT
            value: /Shared/energy-crew-briefing-traces-uc
          - name: AGENT_VERSION
            value: v4

      resources:
        - name: app-db
          description: "Lakebase database for session persistence and caching"
          database:
            database_name: ${resources.database_catalogs.crew-briefing-catalog.database_name}
            instance_name: ${resources.database_catalogs.crew-briefing-catalog.database_instance_name}
            permission: CAN_CONNECT_AND_CREATE

        - name: tavily-api-key
          description: "Tavily API key for web search"
          secret:
            scope: energy-crew-briefing
            key: tavily-api-key
            permission: READ

  jobs:
    bom-weather-refresh:
      name: energy-crew-briefing-bom-refresh
      tags:
        demo: crew_briefing
      environments:
        - environment_key: Default
          spec:
            client: "1"
      tasks:
        - task_key: refresh_bom
          notebook_task:
            notebook_path: setup/03_bom_refresh.py
          environment_key: Default
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "Australia/Sydney"

    gateway-token-refresh:
      name: energy-crew-briefing-gateway-refresh
      tags:
        demo: crew_briefing
      environments:
        - environment_key: Default
          spec:
            client: "1"
      tasks:
        - task_key: refresh_token
          notebook_task:
            notebook_path: setup/07_refresh_gateway_token.py
          environment_key: Default
      schedule:
        quartz_cron_expression: "0 */30 * * * ?"
        timezone_id: "Australia/Sydney"
