command: ['python', '-m', 'uvicorn', 'app:app', '--host', '0.0.0.0', '--port', '8000']
env:
  - name: SERVING_ENDPOINT
    value: 'ee-crew-briefing-gateway'
  - name: TAVILY_API_KEY
    valueFrom: 'tavily-api-key'
  - name: LAKEBASE_INSTANCE
    value: 'ee-crew-briefing'
  - name: PGDATABASE
    value: 'crew_briefing'
